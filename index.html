<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Fullscreen 3D Cube with Music</title>

<style>
body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;
  font-family:sans-serif;
  touch-action: pan-y;
}

/* Fullscreen scene */
.scene{
  width: 100vw;
  height: 100vh;       /* full viewport */
  margin: 0;
  perspective:1200px;
  overflow:hidden;
  position: relative;
}

/* Background images */
.background{
  position:absolute;
  width:100%;
  height:100%;
  z-index:0;
}
.background img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(35px) brightness(0.6);
  opacity:0;
  transition: opacity 1.2s ease, transform 6s ease;
}

/* Cube container */
.cube{
  position:absolute;
  top:50%;
  left:50%;
  width:90vw;       /* almost full width */
  height:90vh;      /* almost full height */
  transform: translate(-50%,-50%);
  transform-style: preserve-3d;
  transition: transform 1.2s ease-in-out;
  will-change: transform;
  z-index:2;
}

/* Cube faces */
.face{
  position:absolute;
  width:100%;
  height:100%;
  background-size: cover;
  background-position: center;
  backface-visibility: hidden;
  will-change: transform;
  box-shadow:0 25px 50px rgba(0,0,0,0.6);
  border-radius:0;
}

/* Optional controls for testing */
.controls{
  position:absolute;
  bottom:15px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:15px;
  z-index:5;
}
.controls button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.2);
  color:#fff;
  font-size:14px;
  backdrop-filter:blur(5px);
}
</style>
</head>

<body>

<div class="scene" id="scene">

  <!-- Background images -->
  <div class="background" id="background"></div>

  <!-- Cube -->
  <div class="cube" id="cube">
      <div class="face" id="front"></div>
      <div class="face" id="back"></div>
      <div class="face" id="right"></div>
      <div class="face" id="left"></div>
      <div class="face" id="top"></div>
      <div class="face" id="bottom"></div>
  </div>

  <!-- Optional controls -->
  <div class="controls">
    <button onclick="rotate('left')">⬅</button>
    <button onclick="rotate('right')">➡</button>
    <button onclick="rotate('up')">⬆</button>
    <button onclick="rotate('down')">⬇</button>
  </div>

</div>

<!-- Background music -->
<audio id="bgMusic" loop></audio>

<script>
/* ===== ASSETS ===== */
const mainImages = [
 "assets/images/main1.jpg","assets/images/main2.jpg","assets/images/main3.jpg",
 "assets/images/main4.jpg","assets/images/main5.jpg","assets/images/main6.jpg",
 "assets/images/main7.jpg","assets/images/main8.jpg","assets/images/main9.jpg"
];

const bgImages = [
 "assets/images/bg1.jpg","assets/images/bg2.jpg","assets/images/bg3.jpg",
 "assets/images/bg4.jpg","assets/images/bg5.jpg","assets/images/bg6.jpg",
 "assets/images/bg7.jpg","assets/images/bg8.jpg","assets/images/bg9.jpg"
];

const songs = [
 "assets/music/song1.mp3","assets/music/song2.mp3","assets/music/song3.mp3",
 "assets/music/song4.mp3","assets/music/song5.mp3","assets/music/song6.mp3",
 "assets/music/song7.mp3","assets/music/song8.mp3","assets/music/song9.mp3"
];
/* ================== */

const cube = document.getElementById("cube");
const scene = document.getElementById("scene");
const audio = document.getElementById("bgMusic");

const faces = {
  front: document.getElementById("front"),
  back: document.getElementById("back"),
  right: document.getElementById("right"),
  left: document.getElementById("left"),
  top: document.getElementById("top"),
  bottom: document.getElementById("bottom")
};

let rotX=0, rotY=0;
let currentIndex=0;
let bgIndex=0;
let autoRotateInterval;
let autoMode=true;

/* Set cube depth dynamically */
function setDepth(){
  const depthX = cube.offsetWidth / 2;
  const depthY = cube.offsetHeight / 2;
  const depth = Math.min(depthX, depthY);
  faces.front.style.transform  = `rotateY(0deg) translateZ(${depth}px)`;
  faces.back.style.transform   = `rotateY(180deg) translateZ(${depth}px)`;
  faces.right.style.transform  = `rotateY(90deg) translateZ(${depth}px)`;
  faces.left.style.transform   = `rotateY(-90deg) translateZ(${depth}px)`;
  faces.top.style.transform    = `rotateX(90deg) translateZ(${depth}px)`;
  faces.bottom.style.transform = `rotateX(-90deg) translateZ(${depth}px)`;
}
window.addEventListener("resize", setDepth);
setDepth();

/* Initial cube faces */
Object.values(faces).forEach((face,i)=>{
  face.style.backgroundImage=`url(${mainImages[i%mainImages.length]})`;
});

/* Background setup */
const bgContainer = document.getElementById("background");
bgImages.forEach((img,i)=>{
  const el = document.createElement("img");
  el.src = img;
  if(i===0){el.style.opacity="1"; el.style.transform="scale(1.1)";}
  bgContainer.appendChild(el);
});

function changeBackground(){
  const imgs = bgContainer.querySelectorAll("img");
  imgs.forEach(img=>img.style.opacity="0");
  imgs[bgIndex].style.opacity="1";
  imgs[bgIndex].style.transform="scale(1.1)";
  bgIndex = (bgIndex+1) % bgImages.length;
}

/* Play song corresponding to current image */
function playSong(index){
  audio.src = songs[index];
  audio.play().catch(()=>{});
}

/* Rotate cube function */
function rotate(direction){
  if(direction==="left") rotY -= 90;
  if(direction==="right") rotY += 90;
  if(direction==="up") rotX += 90;
  if(direction==="down") rotX -= 90;

  cube.style.transform = `translate(-50%,-50%) rotateX(${rotX}deg) rotateY(${rotY}deg)`;

  // Move to next index
  currentIndex = (currentIndex + 1) % mainImages.length;

  // Update cube front face
  faces.front.style.backgroundImage = `url(${mainImages[currentIndex]})`;

  // Update background
  changeBackground();

  // Play matching song
  playSong(currentIndex);

  pauseAuto();
}

/* Auto rotate every 6.66s */
function startAuto(){
  autoRotateInterval = setInterval(()=>{rotate("left");},6666);
}
function pauseAuto(){
  if(autoMode){clearInterval(autoRotateInterval); autoMode=false;}
}
startAuto();

/* Swipe gestures */
let startX=0,startY=0;
scene.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
},{passive:true});

scene.addEventListener("touchend", e=>{
  const dx = e.changedTouches[0].clientX - startX;
  const dy = e.changedTouches[0].clientY - startY;

  if(Math.abs(dx) > Math.abs(dy)){
    if(dx>50) rotate("right");
    if(dx<-50) rotate("left");
  } else {
    if(dy>50) rotate("down");
    if(dy<-50) rotate("up");
  }
});

/* Start music on first interaction */
document.body.addEventListener("click", ()=>{
  playSong(currentIndex);
},{once:true});
</script>

</body>
</html>
